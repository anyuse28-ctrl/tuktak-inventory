# Application
spring.application.name=inventory

# Server
server.port=${PORT:8080}

# PostgreSQL Database - Uses environment variables on Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# SSL for Supabase
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.data-source-properties.ssl=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Supabase connection pooler settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

# Pagination defaults
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

# Logging - reduced for production
logging.level.com.tuktak.inventory=INFO
logging.level.org.springframework.security=WARN

# Email Configuration
sendgrid.api.key=${SENDGRID_API_KEY}
mail.from=${MAIL_FROM}

groq.api.key=${GROQ_API_KEY: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}

