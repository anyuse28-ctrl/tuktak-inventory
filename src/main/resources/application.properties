# Application
spring.application.name=inventory

# Server
server.port=${PORT:8080}

# PostgreSQL Database - Uses environment variables on Render
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/inventory_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Fix for Render PostgreSQL SSL
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=2

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

# Pagination defaults
spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

# Logging - reduced for production
logging.level.com.tuktak.inventory=INFO
logging.level.org.springframework.security=WARN